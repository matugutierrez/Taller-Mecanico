{% extends "base.html" %}
{% block title %}Admin Login - Taller Mecánico{% endblock %}
{% block content %}
<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-wrench"></i>
            <h1>Taller Mecánico</h1>
            <p>Panel de Administración</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div id="loginError" class="error-msg"></div>
            <button type="submit" class="btn btn-primary btn-full"><i class="fas fa-lock"></i> Ingresar</button>
        </form>
    </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const error = document.getElementById('loginError');
    const btn = form.querySelector('button');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Ingresando...';
    try {
        const res = await fetch('/admin/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: form.username.value, password: form.password.value})
        });
        if (res.ok) {
            window.location.href = '/admin';
        } else {
            const data = await res.json();
            error.textContent = data.message || 'Error al iniciar sesión';
        }
    } catch {
        error.textContent = 'Error de conexión';
    }
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-lock"></i> Ingresar';
});
</script>
{% endblock %}
